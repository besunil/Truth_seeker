<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Essay — Your Name</title>
  <meta name="description" content="An essay by Your Name.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="progress" aria-hidden="true"><span class="progress__bar"></span></div>

  <header class="site-head">
    <div class="site-head__inner">
      <a class="brand" href="index.html">Your Name</a>
      <nav class="site-nav" aria-label="Main">
        <a href="index.html">Essays</a>
        <a href="reading.html">Reading</a>
        <a href="about.html">About</a>
        <a href="#" data-random title="Read a random essay">Random</a>
        <button class="theme-toggle" data-theme-toggle type="button" aria-label="Toggle dark mode">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        </button>
      </nav>
    </div>
  </header>

  <main class="wrap" id="main">
    <article id="essay">
      <header class="essay-head">
        <h1 class="essay-title" id="essay-title"></h1>
        <p class="essay-meta" id="essay-meta"></p>
      </header>

      <div class="prose" id="essay-body"></div>
    </article>

    <nav class="essay-pn" id="essay-pn" aria-label="More essays"></nav>

    <section class="subscribe">
      <h2>Get new essays by email</h2>
      <p>If this one was worth your time, the next one will find you.</p>
      <form data-subscribe novalidate>
        <input type="email" placeholder="you@example.com" aria-label="Email address" required>
        <button type="submit">Subscribe</button>
      </form>
      <p class="form-note" aria-live="polite"></p>
    </section>
  </main>

  <footer class="site-foot">
    <div class="site-foot__inner">
      <span>© <span data-year></span> Your Name</span>
      <nav aria-label="Footer">
        <a href="rss.xml">RSS</a>
        <a href="https://x.com/" rel="me">X</a>
        <a href="mailto:you@example.com">Email</a>
      </nav>
    </div>
  </footer>

  <script src="assets/essays.js"></script>
  <script src="assets/main.js"></script>
</body>
</html>
